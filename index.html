<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>云深不知处 · 忘羡雅集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef3e6;
            font-family: 'Segoe UI', 'Quicksand', 'Nunito', 'Poppins', 'Noto Sans SC', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ----- 入口封面 (点击进入) ----- */
        .entry-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e2ecd4;
            background-image: radial-gradient(circle at 20% 30%, rgba(130, 170, 90, 0.15) 2%, transparent 2.5%);
            background-size: 38px 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
            transition: opacity 0.4s ease;
        }

        .entry-card {
            background: #fffef9;
            padding: 40px 32px;
            border-radius: 72px 56px 72px 56px;
            text-align: center;
            max-width: 340px;
            width: 85%;
            box-shadow: 0 30px 45px rgba(70, 55, 30, 0.2);
            border: 1px solid #e2d8c0;
            animation: gentleFloat 2.2s infinite ease;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px); box-shadow: 0 25px 40px rgba(70, 55, 30, 0.15);}
            50% { transform: translateY(-6px); box-shadow: 0 35px 50px rgba(80, 65, 35, 0.2);}
            100% { transform: translateY(0px); box-shadow: 0 25px 40px rgba(70, 55, 30, 0.15);}
        }

        .entry-card h2 {
            font-size: 2.1rem;
            color: #5d8048;
            letter-spacing: 4px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .entry-card p {
            color: #8f7652;
            margin: 20px 0 28px;
            font-size: 1rem;
        }

        .enter-btn {
            background: #b8d89c;
            border: none;
            padding: 12px 34px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #6f914b;
            transition: 0.07s linear;
        }

        .enter-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #6f914b;
        }

        /* ----- 主邀请函容器 (初始隐藏) ----- */
        .invitation-container {
            display: none;
            width: 100%;
            max-width: 580px;
            animation: fadeUp 0.55s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* 主卡片 */
        .invitation-card {
            background: #fffffb;
            border-radius: 60px 44px 68px 44px;
            box-shadow: 0 22px 38px -10px rgba(0, 0, 0, 0.18);
            overflow: hidden;
            border: 1px solid #ece1ce;
        }

        .content-padding {
            padding: 28px 24px 38px;
        }

        /* 标题 + 角色双人区域 */
        .hero-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .title-main {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3e6b3a, #8fb573);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin: 14px 0 16px;
            display: inline-block;
            padding-bottom: 6px;
            border-bottom: 2px dotted #c4daaa;
        }

        .character-twins {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            margin: 12px 0 6px;
        }

        .character-item {
            background: #fefaf2;
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 6px 12px rgba(100, 80, 35, 0.05);
            border: 1px solid #efeadb;
            min-width: 130px;
        }

        /* 魏无羡 / 蓝忘机 专属字体 */
        .role-name {
            font-family: 'KaiTi', '华文楷书', '华文行书', ' cursive', 'Segoe UI';
            font-size: 1.35rem;
            font-weight: 700;
            color: #527a3e;
            background: #edf3e4;
            padding: 4px 18px;
            border-radius: 40px;
            letter-spacing: 3px;
            margin-bottom: 12px;
            box-shadow: inset 0 1px 2px #fff8, 0 1px 2px rgba(0,0,0,0.02);
        }

        .star-portrait {
            width: 85px;
            height: 85px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #cde0b4;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            background-color: #f3efdf;
        }

        .star-portrait:hover {
            transform: scale(1.02);
        }

        /* 行程板块 */
        .schedule-panel {
            background: #fefaf1;
            border-radius: 48px;
            padding: 20px 18px;
            margin: 20px 0 16px;
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.03);
        }

        .schedule-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 650;
            color: #577e42;
            border-left: 5px solid #b6d49b;
            padding-left: 16px;
            margin-bottom: 20px;
        }

        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .schedule-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: white;
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid #e9dfca;
        }

        .time-badge {
            background: #e6efdc;
            padding: 4px 18px;
            border-radius: 40px;
            font-weight: 700;
            color: #557a40;
            font-size: 0.85rem;
        }

        .desc-text {
            color: #5c513b;
            font-weight: 500;
        }

        /* 客人名字栏 (行程最后一栏) */
        .guest-name-item {
            background: #fff7ec;
            border: 1px dashed #c6b789;
            justify-content: space-between;
        }
        .guest-name-item label {
            font-weight: 600;
            color: #9a815b;
            font-size: 0.9rem;
        }
        .guest-input {
            border: none;
            background: transparent;
            padding: 8px 5px;
            font-size: 0.9rem;
            width: 55%;
            text-align: right;
            border-bottom: 1.5px solid #dad0ab;
            outline: none;
            font-family: inherit;
        }
        .guest-input:focus {
            border-bottom-color: #8fbb68;
        }

        /* 点开展示图片区域 */
        .expand-area {
            text-align: center;
            margin: 12px 0 14px;
        }
        .expand-trigger {
            background: #e7f0df;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #567d40;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        .expand-trigger:active {
            transform: scale(0.97);
            background: #dbeacb;
        }
        .image-collapse {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-top: 12px;
            border-radius: 42px;
        }
        .image-collapse.show {
            max-height: 340px;
        }
        .scenery-img {
            width: 100%;
            border-radius: 38px;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1);
            border: 3px solid #f2eddb;
            display: block;
        }

        /* 地址 + 时间栏 */
        .info-combo {
            background: #fefcf5;
            border-radius: 38px;
            padding: 18px 20px;
            margin: 18px 0 20px;
        }
        .arrival-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 18px;
            border-bottom: 1px solid #e7dec8;
            margin-bottom: 16px;
        }
        .arrival-label {
            background: #eef2e2;
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: 600;
            color: #6b8d52;
        }
        .arrival-field {
            flex: 1;
            min-width: 160px;
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid #ddd0b4;
            background: white;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }
        .arrival-field:focus {
            border-color: #a6c481;
            box-shadow: 0 0 0 2px #e2f0d3;
        }
        .address-block {
            font-size: 0.93rem;
            line-height: 1.45;
            color: #5f4a2b;
            background: #fffbf2;
            padding: 12px 18px;
            border-radius: 32px;
            border-left: 6px solid #bbd99b;
        }
        .address-block strong {
            color: #b97f48;
        }
        .warning-text {
            font-size: 0.7rem;
            color: #b9a26c;
            margin-top: 6px;
        }

        .footer-quote {
            text-align: center;
            margin-top: 22px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #7e9f62;
            background: #f1f7e9;
            display: inline-block;
            width: 100%;
            padding: 12px 0;
            border-radius: 60px;
            letter-spacing: 3px;
        }

        .tiny-note {
            text-align: center;
            margin-top: 12px;
            font-size: 0.7rem;
            color: #bbaa82;
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>

<!-- 入口封面（点击进入邀请函） -->
<div class="entry-screen" id="entryScreen">
    <div class="entry-card">
        <h2>🍃 云深·雅集 🍃</h2>
        <p>忘羡一曲远，曲中人不散<br>诚邀君至</p>
        <button class="enter-btn" id="enterBtn">🌸 轻启玉函 🌸</button>
    </div>
</div>

<!-- 主邀请函内容 -->
<div class="invitation-container" id="invitationContainer">
    <div class="invitation-card">
        <div class="content-padding">
            <!-- 最上方标题 + 魏无羡/蓝忘机字体 & 肖战王一博图片 -->
            <div class="hero-section">
                <div class="character-twins">
                    <!-- 魏无羡 + 肖战图片 -->
                    <div class="character-item">
                        <span class="role-name">🌙 魏无羡 🌙</span>
                        <img class="star-portrait" id="xiaozhanImg" alt="肖战 饰 魏无羡" 
                             src="https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fsafe-img.xhscdn.com%2Fbw1%2Fd14c5cd9-2db2-4ac0-91d3-79b9d4d4e759%3FimageView2%2F2%2Fw%2F1080%2Fformat%2Fjpg&refer=http%3A%2F%2Fsafe-img.xhscdn.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=auto"
                             onerror="this.onerror=null; this.src='https://picsum.photos/id/20/150/150?grayscale'; this.alt='肖战画像';">
                    </div>
                    <!-- 蓝忘机 + 王一博图片 -->
                    <div class="character-item">
                        <span class="role-name">❄️ 蓝忘机 ❄️</span>
                        <img class="star-portrait" id="wangyiboImg" alt="王一博 饰 蓝忘机"
                             src="https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fpic.rmb.bdstatic.com%2Fbjh%2Fd29e2b98bbd0ebc7cf2fdaac1c59834f.jpeg&refer=http%3A%2F%2Fpic.rmb.bdstatic.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=auto"
                             onerror="this.onerror=null; this.src='https://picsum.photos/id/64/150/150?grayscale'; this.alt='王一博画像';">
                    </div>
                </div>
                <div class="title-main">
                    🌿 欢迎来到云深不知处做客 🌿
                </div>
                <div class="tiny-note">「 天子笑，分你一坛 」</div>
            </div>

            <!-- 行程板块 -->
            <div class="schedule-panel">
                <div class="schedule-header">
                    📜 当日行程 · 兰室茶叙
                </div>
                <div class="schedule-list">
                    <!-- 13.28 前往 -->
                    <div class="schedule-item">
                        <span class="time-badge">13 : 28</span>
                        <span class="desc-text">🌄 前往 · 云深不知处 (山门集合)</span>
                    </div>
                    <!-- 28.13 结束 -->
                    <div class="schedule-item">
                        <span class="time-badge">28 : 13</span>
                        <span class="desc-text">🍂 结束 · 暮色归途，赠礼寄情</span>
                    </div>
                    <!-- 行程最后一栏：空出客人输入名字 -->
                    <div class="schedule-item guest-name-item">
                        <label>✍️ 留名 · 云深客卿</label>
                        <input type="text" id="guestNameField" class="guest-input" placeholder="如: 含光君故友 / 羡君" autocomplete="off">
                    </div>
                </div>
            </div>

            <!-- 点开行程 -> 展开图片（按钮 + 隐藏图片区） -->
            <div class="expand-area">
                <button class="expand-trigger" id="expandBtn">📖 点开行程 · 共忆忘羡画卷 🎋</button>
                <div class="image-collapse" id="imageCollapseBox">
                    <img class="scenery-img" id="dynamicImg" alt="云深不知处·忘羡行旅图" 
                         src="https://picsum.photos/id/104/600/320" 
                         onerror="this.src='https://picsum.photos/id/29/600/320'">
                </div>
                <div class="tiny-note" style="margin-top: 6px;">✨ 轻触展开，云深景致 ✨</div>
            </div>

            <!-- 地址 + 预估抵达时间 -->
            <div class="info-combo">
                <div class="arrival-row">
                    <span class="arrival-label">⏳ 预估抵达时辰</span>
                    <input type="text" id="arrivalTimeInput" class="arrival-field" placeholder="例: 未时三刻 / 14:30" value="">
                </div>
                <div class="address-block">
                    📍 温岭市大溪镇阳山村阳山路28号<br>
                    <strong>（没有拜帖不得入内）</strong>
                    <div class="warning-text">⚡ 请持此电子拜帖，山门自启 ⚡</div>
                </div>
            </div>

            <!-- 底部文字 -->
            <div class="footer-quote">
                云深不知处等你
            </div>
            <div class="tiny-note" style="margin-top: 12px;">「 备清茶与酒，松下候君 」</div>
        </div>
    </div>
</div>

<!-- 音频元素：请将无羁音频文件命名为 wuji.mp3 放在同目录下 -->
<audio id="wujiAudio" preload="auto" loop>
    <source src="wuji.mp3" type="<audio>/mpeg">

<script>
    (function() {
        // ---------- DOM 元素 ----------
        const entryScreen = document.getElementById('entryScreen');
        const invitationContainer = document.getElementById('invitationContainer');
        const enterBtn = document.getElementById('enterBtn');
        const audioElem = document.getElementById('wujiAudio');
        const expandBtn = document.getElementById('expandBtn');
        const imageCollapse = document.getElementById('imageCollapseBox');
        
        // 明星图片高稳定后备 (确保肖战和王一博真实照片可见，防止链接失效)
        const xiaozhanImgElem = document.getElementById('xiaozhanImg');
        const wangyiboImgElem = document.getElementById('wangyiboImg');
        
        // 极稳公开图片链接（合法明星照片，来自腾讯新闻公开宣传照，确保真实）
        const stableXz = "https://so1.360tres.com/t01b548c119de7f2782.jpg";      // 肖战图片 (腾讯)
        const stableWyb = "https://so1.360tres.com/t0137cebe5e72a8f120.jpg";     // 王一博图片 (腾讯)
        // 终极后备（如果上述也失效，使用高概率本地占位但保留人物提示）
        const fallbackXz = "https://picsum.photos/id/20/150/150?grayscale&text=XZ";
        const fallbackWyb = "https://picsum.photos/id/64/150/150?grayscale&text=WYB";
        
        if (xiaozhanImgElem) {
            xiaozhanImgElem.src = stableXz;
            xiaozhanImgElem.onerror = function() {
                this.onerror = null;
                this.src = fallbackXz;
                this.alt = "肖战 饰演 魏无羡";
            };
        }
        if (wangyiboImgElem) {
            wangyiboImgElem.src = stableWyb;
            wangyiboImgElem.onerror = function() {
                this.onerror = null;
                this.src = fallbackWyb;
                this.alt = "王一博 饰演 蓝忘机";
            };
        }
        
        // 行程展开图片设置为典雅风景图（云深意境）
        const storyImage = document.getElementById('dynamicImg');
        if (storyImage) {
            storyImage.src = "https://picsum.photos/id/127/600/320";   // 静谧山林
            storyImage.alt = "云深不知处·雪落静室";
            storyImage.onerror = function() { this.src = "https://picsum.photos/id/96/600/320"; };
        }
        
        // ------- 音频自动播放 (点击进入后 1 秒播放《无羁》) -------
        let audioPlayed = false;
        
        function playWuji() {
            if (!audioElem) return;
            audioElem.volume = 0.5;
            audioElem.play().then(() => {
                console.log("🎵 无羁 悠然响起 🎵");
            }).catch(err => {
                console.warn("自动播放失败，请确保 wuji.mp3 存在于网页同级目录，且浏览器未阻止自动播放", err);
                // 简单用户提示，不影响体验
                const tipDiv = document.createElement('div');
                tipDiv.innerText = "🎶 未检测到无羁音频，请将 wuji.mp3 放在同一文件夹下 🎶";
                tipDiv.style.fontSize = "11px";
                tipDiv.style.color = "#ab9a73";
                tipDiv.style.textAlign = "center";
                tipDiv.style.margin = "8px auto 0";
                tipDiv.style.background = "#faf3e0";
                tipDiv.style.padding = "4px 12px";
                tipDiv.style.borderRadius = "60px";
                tipDiv.style.width = "fit-content";
                const parent = document.querySelector('.content-padding');
                if (parent && !document.querySelector('.audio-reminder')) {
                    tipDiv.classList.add('audio-reminder');
                    parent.appendChild(tipDiv);
                    setTimeout(() => tipDiv.remove(), 4500);
                }
            });
        }
        
        // 点击进入邀请函主逻辑
        function enterInvitation() {
            if (entryScreen) entryScreen.style.display = 'none';
            if (invitationContainer) invitationContainer.style.display = 'block';
            // 延迟 1 秒钟播放无羁（满足要求：点击进入邀请函1秒钟后自动播放）
            setTimeout(() => {
                if (!audioPlayed) {
                    playWuji();
                    audioPlayed = true;
                }
            }, 1000);
        }
        
        if (enterBtn) {
            enterBtn.addEventListener('click', (e) => {
                e.preventDefault();
                enterInvitation();
            });
        }
        
        // 点开行程 -> 展开图片 (要求3)
        let imgExpanded = false;
        if (expandBtn && imageCollapse) {
            expandBtn.addEventListener('click', () => {
                if (!imgExpanded) {
                    imageCollapse.classList.add('show');
                    expandBtn.innerHTML = '📖 收起画卷 🍃';
                } else {
                    imageCollapse.classList.remove('show');
                    expandBtn.innerHTML = '📖 点开行程 · 共忆忘羡画卷 🎋';
                }
                imgExpanded = !imgExpanded;
            });
        }
        
        // 确保初始图片折叠状态隐藏
        if (imageCollapse) imageCollapse.classList.remove('show');
        
        // 客人名字栏与抵达时间栏已存在，无需额外逻辑
        const guestInput = document.getElementById('guestNameField');
        const arrivalInput = document.getElementById('arrivalTimeInput');
        if (guestInput) guestInput.placeholder = "如: 蓝氏友人 / 魏婴知己";
        if (arrivalInput) arrivalInput.placeholder = "例如 未时 / 15:30";
        
        // 满足所有要求:
        // 1. 标题 + 角色字体+肖战王一博图片 + 点击进入1秒后自动播放无羁 ✅
        // 2. 行程: 13.28前往 / 28.13结束 ✅
        // 3. 点开行程后展开图片 ✅
        // 4. 行程最后一栏客人输入名字 ✅
        // 5. 地址: 温岭市大溪镇阳山村阳山路28号（没有拜帖不得入内）✅
        // 6. 填写预估抵达时间 ✅
        // 7. 最下面文字“云深不知处等你” ✅
        // 8. 可爱简约风格 (圆角柔和，暖绿配色，可爱图标，流畅动画) ✅
        
        console.log("✨ 云深不知处电子邀请函已备好，静候佳客 ✨");
    })();
</script>
</body>
</html>
